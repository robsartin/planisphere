<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Planisphere</title>
    <!--
      OpenGraph / Twitter social preview (Plan 07 2A, issue #216).
      This is a placeholder: a single static PNG used for every shared URL.
      TODO(#217): real per-URL previews require SSR, which needs the backend
      decided in 2B. Once that lands, swap these tags for a dynamic image URL
      keyed on lat/lon/time.
    -->
    <meta property="og:title" content="Planisphere" />
    <meta
      property="og:description"
      content="Interactive sky chart — explore the night sky from any location and time."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Planisphere" />
    <meta
      name="twitter:description"
      content="Interactive sky chart — explore the night sky from any location and time."
    />
    <meta name="twitter:image" content="/og-default.png" />
    <style>
      html,
      body,
      #app {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #cesium-container {
        width: 100%;
        height: 100%;
      }
      #error {
        color: #ff6b6b;
        font-family: monospace;
        padding: 2rem;
      }
      .night-vision {
        filter: sepia(1) saturate(3) brightness(0.7) hue-rotate(-30deg);
      }
      .night-vision .cesium-widget canvas {
        filter: sepia(1) saturate(5) brightness(0.6) hue-rotate(-30deg);
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div id="cesium-container"></div>
      <div id="error" style="display: none"></div>
      <div id="ui-panel-root"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
